<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>最簡單的問題，最難的答案｜3D 全息版</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:#04070d;
    font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;color:#eaf2f7;}
  #c3d{position:fixed;inset:0;display:block;}
  .ov{position:fixed;z-index:10;pointer-events:none;}
  .ov button{pointer-events:auto;}

  .bar-cine{position:fixed;left:0;right:0;height:0;background:#000;z-index:14;transition:height 1s ease;pointer-events:none;}
  #barTop{top:0;} #barBot{bottom:0;}
  body.cine #barTop,body.cine #barBot{height:11vh;}
  #vignette{position:fixed;inset:0;z-index:12;pointer-events:none;background:radial-gradient(120% 100% at 50% 50%,rgba(0,0,0,0) 52%,rgba(0,0,0,.58) 100%);}

  #subs{position:fixed;inset:0;z-index:11;pointer-events:none;}
  .sub{position:absolute;left:7%;right:7%;text-align:center;opacity:0;will-change:opacity,transform;text-shadow:0 .12em .8em rgba(0,0,0,.8);}
  .sub.center{top:50%;transform:translateY(-50%);}
  .sub.lower{bottom:15%;}
  .big{font-weight:600;letter-spacing:.05em;font-size:min(5vw,5.6vh);line-height:1.5;}
  .mid{font-weight:600;letter-spacing:.04em;font-size:min(3.4vw,3.9vh);line-height:1.5;}
  .dim{color:#9fb8d0;} .warm{color:#ffd9a8;} .hot{color:#ff9a6a;}
  #clock3d{position:fixed;right:7%;top:14vh;z-index:11;font-family:"Consolas",monospace;font-size:min(3vw,3.4vh);
    letter-spacing:.1em;color:#7fa0c4;opacity:0;}

  #prog{position:fixed;left:12%;right:12%;bottom:5%;height:.32vh;background:rgba(255,255,255,.08);border-radius:2px;z-index:15;opacity:0;transition:opacity .6s;}
  #prog i{display:block;height:100%;width:0;background:rgba(220,235,250,.6);border-radius:2px;}
  #endhint{position:fixed;left:0;right:0;bottom:5.4%;text-align:center;z-index:15;font-size:min(1.3vw,1.6vh);color:rgba(255,220,180,.4);letter-spacing:.2em;opacity:0;transition:opacity 1s;}

  #start{position:fixed;inset:0;z-index:40;background:radial-gradient(ellipse at 50% 42%,#0c1a2c,#04080e 80%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2.2vh;transition:opacity .8s;}
  #start.hide{opacity:0;pointer-events:none;}
  #start .kick{letter-spacing:.5em;color:#5f86b0;font-size:min(1.5vw,1.8vh);}
  #start h1{font-size:min(4.4vw,5vh);font-weight:600;letter-spacing:.06em;color:#eaf2f7;}
  #start .meta{color:#7e98b6;font-size:min(1.6vw,1.9vh);letter-spacing:.06em;}
  #playBtn{margin-top:1.5vh;padding:1.3vh 5vw;font-size:min(2.1vw,2.4vh);letter-spacing:.3em;text-indent:.3em;color:#04221c;cursor:pointer;font-family:inherit;font-weight:700;border:none;border-radius:6px;background:linear-gradient(180deg,#6ff0d6,#33c4a8);box-shadow:0 0 3vh rgba(80,220,190,.4);}
  #playBtn:hover{filter:brightness(1.08);}
  #start .keys{margin-top:1.6vh;color:#5e7890;font-size:min(1.3vw,1.6vh);letter-spacing:.05em;line-height:1.9;text-align:center;}
  #start .keys b{color:#9fc0e0;font-weight:600;}
  #errBox{position:fixed;inset:30% 18%;z-index:200;background:#2a0f0f;border:1px solid #e04848;border-radius:8px;padding:24px;display:none;font-size:14px;line-height:1.8;}
</style>
</head>
<body>
<canvas id="c3d"></canvas>
<div class="bar-cine" id="barTop"></div>
<div class="bar-cine" id="barBot"></div>
<div id="vignette"></div>

<div id="subs">
  <div class="sub center big" id="s1">山苦瓜，下週會不會缺貨？</div>
  <div class="sub lower mid" id="s2"><b class="hot">一個問題</b>，被切成四塊。</div>
  <div class="sub lower mid" id="s3">第六張，<b class="hot">還沒對完</b>。</div>
  <div class="sub center big" id="s4"><span class="mid dim" style="display:block;margin-bottom:1.5vh">忙了一整天。</span>還是不確定——算得<b class="hot">對不對</b>。</div>
  <div class="sub lower big" id="s5" style="bottom:13%"><span class="dim">如果……</span> 有一個<span class="warm">「懂供應鏈的 AI 同事」</span>？</div>
  <div class="sub lower big" id="s6" style="bottom:11%"><span class="dim mid" style="display:block;margin-bottom:1.2vh">山苦瓜，下週會不會缺貨？</span><span class="warm">「不會。我幫你看過了。」</span><span class="warm" style="letter-spacing:.3em;display:inline-block;margin-left:.6em">隨問，隨答。</span></div>
</div>
<div id="clock3d">21:47</div>

<div id="prog"><i id="progi"></i></div>
<div id="endhint">— 按 R 重播 —</div>

<div id="start">
  <div class="kick">SUPPLY CHAIN ‧ 開場 ‧ 3D 全息版</div>
  <h1>最簡單的問題，最難的答案</h1>
  <div class="meta">約 60 秒 ‧ 建議全螢幕播放 ‧ 含音樂與旁白</div>
  <button id="playBtn">▶ 開始</button>
  <div class="keys"><b>空白</b> 暫停／繼續　<b>→/點擊</b> 下一段　<b>R</b> 重播　<b>M</b> 音樂　<b>N</b> 旁白　<b>拖曳</b> 自由視角</div>
</div>
<div id="errBox"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script>
'use strict';
function fatal(m){var b=document.getElementById('errBox');b.style.display='block';b.innerHTML='<b>載入失敗</b><br>'+m;}
if(typeof THREE==='undefined'){fatal('Three.js 載入失敗，請確認網路後重新整理。');}
else{
try{
const clamp=(x,a,b)=>x<a?a:x>b?b:x;
const smooth=x=>{x=clamp(x,0,1);return x*x*(3-2*x);};
const easeIO=x=>{x=clamp(x,0,1);return x<0.5?4*x*x*x:1-Math.pow(-2*x+2,3)/2;};
const easeOut=x=>{x=clamp(x,0,1);return 1-Math.pow(1-x,3);};
const rand=(a,b)=>a+Math.random()*(b-a);
const DEG=Math.PI/180;

const canvas=document.getElementById('c3d');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x04070d);
scene.fog=new THREE.FogExp2(0x04070d,0.012);
const camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,400);
camera.position.set(0,4,18);
const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=0.08;controls.maxPolarAngle=Math.PI*0.52;controls.minDistance=4;controls.maxDistance=80;
controls.target.set(0,4,0);

// 「色溫即光源」主光源（冷→暖）
const keyLight=new THREE.PointLight(0x3a78ff,1.2,120,2);keyLight.position.set(0,8,6);scene.add(keyLight);
const hemi=new THREE.HemisphereLight(0x2a4a6a,0x0a1018,0.5);scene.add(hemi);

// Bloom 後製
let composer=null,bloom=null,useComposer=false;
try{
  composer=new THREE.EffectComposer(renderer);
  composer.addPass(new THREE.RenderPass(scene,camera));
  bloom=new THREE.UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.7,0.5,0.3);
  composer.addPass(bloom);
  useComposer=true;
}catch(e){useComposer=false;}

// ---------- 共用 ----------
function holoMat(col,op){return new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:op,blending:THREE.AdditiveBlending,depthWrite:false});}
function makeSprite(lines,opt){
  opt=opt||{};const fs=opt.fs||40,pad=opt.pad||16;
  const cv=document.createElement('canvas'),ctx=cv.getContext('2d');
  ctx.font='700 '+fs+'px "PingFang TC","Microsoft JhengHei",sans-serif';
  let w=0;lines.forEach(l=>w=Math.max(w,ctx.measureText(l).width));
  cv.width=Math.ceil(w+pad*2);cv.height=fs*1.3*lines.length+pad*2;
  const c=cv.getContext('2d');
  if(opt.bg){c.fillStyle=opt.bg;c.beginPath();const r=14;c.moveTo(r,0);c.arcTo(cv.width,0,cv.width,cv.height,r);c.arcTo(cv.width,cv.height,0,cv.height,r);c.arcTo(0,cv.height,0,0,r);c.arcTo(0,0,cv.width,0,r);c.fill();}
  c.font='700 '+fs+'px "PingFang TC","Microsoft JhengHei",sans-serif';c.textAlign='center';c.textBaseline='middle';c.fillStyle=opt.color||'#fff';
  lines.forEach((l,i)=>c.fillText(l,cv.width/2,pad+fs*1.3*(i+0.5)));
  const tex=new THREE.CanvasTexture(cv);tex.minFilter=THREE.LinearFilter;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false,depthWrite:false}));
  const h=opt.h||3;sp.scale.set(h*cv.width/cv.height,h,1);sp.renderOrder=30;return sp;
}
function glowTex(){const cv=document.createElement('canvas');cv.width=cv.height=64;const c=cv.getContext('2d');const g=c.createRadialGradient(32,32,1,32,32,30);g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(0.4,'rgba(255,255,255,.6)');g.addColorStop(1,'rgba(255,255,255,0)');c.fillStyle=g;c.fillRect(0,0,64,64);return new THREE.CanvasTexture(cv);}
const TEXG=glowTex();

// ---------- 全息人形 ----------
function makeFigure(col,scale){
  const g=new THREE.Group();const s=scale||1;const mb=holoMat(col,0.6),mg=holoMat(col,0.14);
  const tr=new THREE.Mesh(new THREE.CylinderGeometry(0.85*s,1.7*s,5.2*s,16),mb);tr.position.y=2.6*s;g.add(tr);
  const trg=new THREE.Mesh(new THREE.CylinderGeometry(1.15*s,2.0*s,5.5*s,16),mg);trg.position.y=2.6*s;g.add(trg);
  const hd=new THREE.Mesh(new THREE.SphereGeometry(0.8*s,18,14),mb);hd.position.y=6.3*s;g.add(hd);
  const hdg=new THREE.Mesh(new THREE.SphereGeometry(1.06*s,18,14),mg);hdg.position.y=6.3*s;g.add(hdg);
  [-1,1].forEach(side=>{const a=new THREE.Mesh(new THREE.CylinderGeometry(0.25*s,0.18*s,2.7*s,8),mb);a.geometry.translate(0,-1.35*s,0);a.position.set(side*1.1*s,4.9*s,0);a.rotation.z=side*0.5;g.add(a);});
  const ring=new THREE.Mesh(new THREE.RingGeometry(1.7*s,2.2*s,40),holoMat(col,0.55));ring.rotation.x=-Math.PI/2;ring.position.y=0.04;g.add(ring);
  return g;
}

// ---------- 演員可見度系統 ----------
const ACT=[];
function reg(group,baseScale){const mats=[];group.traverse(o=>{if(o.material&&o.material.transparent){o.material._b=o.material.opacity;mats.push(o.material);}});const a={group,mats,baseScale:baseScale||1,vis:0};group.visible=false;scene.add(group);ACT.push(a);return a;}
function setVis(a,e){a.group.visible=e>0.004;if(!a.group.visible)return;a.group.scale.setScalar(a.baseScale*(0.6+0.4*e));for(const m of a.mats)m.opacity=m._b*e;}

// ---------- 粒子文字（場景1） ----------
function textPoints(text,fontPx,scl){
  const cv=document.createElement('canvas'),c=cv.getContext('2d');
  c.font='700 '+fontPx+'px "PingFang TC","Microsoft JhengHei",sans-serif';
  const w=Math.ceil(c.measureText(text).width)+20,h=Math.ceil(fontPx*1.5);
  cv.width=w;cv.height=h;const c2=cv.getContext('2d');
  c2.font=c.font;c2.fillStyle='#fff';c2.textBaseline='middle';c2.fillText(text,10,h/2);
  const d=c2.getImageData(0,0,w,h).data,pts=[];
  for(let y=0;y<h;y+=3)for(let x=0;x<w;x+=3){if(d[(y*w+x)*4+3]>128)pts.push([(x-w/2)*scl,(h/2-y)*scl]);}
  return pts;
}
const QTEXT=textPoints('山苦瓜，下週會不會缺貨？',64,0.045);
const TN=QTEXT.length;
const tGeo=new THREE.BufferGeometry();
const tPos=new Float32Array(TN*3),tTgt=new Float32Array(TN*3),tStart=new Float32Array(TN*3);
for(let i=0;i<TN;i++){tTgt[i*3]=QTEXT[i][0];tTgt[i*3+1]=5+QTEXT[i][1];tTgt[i*3+2]=-1+rand(-0.4,0.4);
  const r=rand(14,30),a=rand(0,Math.PI*2),b=rand(0,Math.PI);
  tStart[i*3]=Math.sin(b)*Math.cos(a)*r;tStart[i*3+1]=5+Math.cos(b)*r*0.6;tStart[i*3+2]=Math.sin(b)*Math.sin(a)*r-1;
  tPos[i*3]=tStart[i*3];tPos[i*3+1]=tStart[i*3+1];tPos[i*3+2]=tStart[i*3+2];}
tGeo.setAttribute('position',new THREE.BufferAttribute(tPos,3));
const tMat=new THREE.PointsMaterial({size:0.32,map:TEXG,color:0x6fc0ff,transparent:true,opacity:0,depthWrite:false,blending:THREE.AdditiveBlending});
const tPts=new THREE.Points(tGeo,tMat);tPts.frustumCulled=false;scene.add(tPts);

// ---------- 四部門人形（場景2，圍弧） ----------
const DEPT=[
  {n:'倉管',col:0x4aa8ff,ang:-58},{n:'生管',col:0x4ade7a,ang:-20},
  {n:'採購',col:0xffb05c,ang:20},{n:'品管',col:0xc070ff,ang:58},
];
const cssCol=['#4aa8ff','#4ade7a','#ffb05c','#c070ff'];
const RADF=14;
DEPT.forEach((d,i)=>{
  const g=makeFigure(d.col,1.0);
  const a=d.ang*DEG;
  g.position.set(Math.sin(a)*RADF,0,-Math.cos(a)*RADF+2);
  g.lookAt(0,3,8);
  const lbl=makeSprite([d.n],{fs:38,color:'#fff',bg:cssCol[i]+'dd',h:2.1});lbl.position.set(0,9.7,0);g.add(lbl);
  d.actor=reg(g,1);d.pop=0.6+i*1.1;
});
// 中央被傳遞的問題光點
const qball=new THREE.Mesh(new THREE.SphereGeometry(0.5,16,16),holoMat(0x9fd8ff,1));
const qglow=new THREE.Sprite(new THREE.SpriteMaterial({map:TEXG,color:0x6fc0ff,transparent:true,opacity:0.9,depthWrite:false,blending:THREE.AdditiveBlending}));
qglow.scale.set(4,4,1);qball.add(qglow);
const aQball=reg(qball,1);
// 纏亂資料線（中心↔四部門）
const lineMat=new THREE.LineBasicMaterial({color:0x5f9ad0,transparent:true,opacity:0,blending:THREE.AdditiveBlending});
const lineGeo=new THREE.BufferGeometry();
const LSEG=4*16;const linePos=new Float32Array(LSEG*2*3);
lineGeo.setAttribute('position',new THREE.BufferAttribute(linePos,3));
const tangle=new THREE.LineSegments(lineGeo,lineMat);tangle.frustumCulled=false;scene.add(tangle);

// ---------- 六張玻璃面板（場景3，環繞牢籠） ----------
function panelTex(){
  const cv=document.createElement('canvas');cv.width=300;cv.height=190;const c=cv.getContext('2d');
  c.fillStyle='rgba(14,26,44,0.5)';c.fillRect(0,0,300,190);
  c.fillStyle='rgba(70,140,210,0.85)';c.fillRect(0,0,300,22);
  c.strokeStyle='rgba(120,170,220,0.45)';c.lineWidth=1;
  for(let x=0;x<=300;x+=50){c.beginPath();c.moveTo(x,22);c.lineTo(x,190);c.stroke();}
  for(let y=22;y<=190;y+=24){c.beginPath();c.moveTo(0,y);c.lineTo(300,y);c.stroke();}
  for(let i=0;i<16;i++){const r=Math.random();c.fillStyle=r<0.5?'rgba(120,160,200,0.2)':(r<0.62?'rgba(210,150,90,0.25)':'rgba(90,150,210,0.22)');if(r<0.72)c.fillRect(2+(i%6)*50,24+((i/6)|0)*24,46,20);}
  const t=new THREE.CanvasTexture(cv);t.minFilter=THREE.LinearFilter;return t;
}
const PANELS=[];const PN=6;
for(let i=0;i<PN;i++){
  const g=new THREE.Group();
  const m=new THREE.Mesh(new THREE.PlaneGeometry(7,4.4),new THREE.MeshBasicMaterial({map:panelTex(),transparent:true,opacity:0.9,side:THREE.DoubleSide,depthWrite:false}));
  g.add(m);
  const edge=new THREE.Mesh(new THREE.PlaneGeometry(7.3,4.7),holoMat(0x4a90d0,0.14));edge.position.z=-0.02;g.add(edge);
  PANELS.push(reg(g,1));
}
// 玻璃面板塌縮後的光塵（場景4）
const DN=900;const dGeo=new THREE.BufferGeometry();const dPos=new Float32Array(DN*3),dVel=new Float32Array(DN*3);
for(let i=0;i<DN;i++){const r=rand(3,11),a=rand(0,Math.PI*2),y=rand(0,16);dPos[i*3]=Math.cos(a)*r;dPos[i*3+1]=y;dPos[i*3+2]=Math.sin(a)*r;dVel[i*3]=rand(-1,1);dVel[i*3+1]=rand(-1.5,-0.3);dVel[i*3+2]=rand(-1,1);}
dGeo.setAttribute('position',new THREE.BufferAttribute(dPos,3));
const dMat=new THREE.PointsMaterial({size:0.18,map:TEXG,color:0x6f9ec8,transparent:true,opacity:0,depthWrite:false,blending:THREE.AdditiveBlending});
const dust=new THREE.Points(dGeo,dMat);dust.frustumCulled=false;scene.add(dust);

// ---------- 暖金 AI 同事（場景5-6） ----------
const ally=makeFigure(0xffc06a,1.18);
ally.position.set(0,0,1);
const allyLbl=makeSprite(['AI 供應鏈同事'],{fs:34,color:'#fff3e0',bg:'rgba(150,90,30,0.9)',h:2.2});allyLbl.position.set(0,9.6,0);ally.add(allyLbl);
const aAlly=reg(ally,1);
// AI 掌心暖金光球（場景6）
const orb=new THREE.Mesh(new THREE.SphereGeometry(0.38,18,18),holoMat(0xffd089,0.85));
const orbGlow=new THREE.Sprite(new THREE.SpriteMaterial({map:TEXG,color:0xffc070,transparent:true,opacity:0.85,depthWrite:false,blending:THREE.AdditiveBlending}));
orbGlow.scale.set(2.2,2.2,1);orb.add(orbGlow);
orb.position.set(1.4,4.3,3.6);
const aOrb=reg(orb,1);

// 地面網格
const grid=new THREE.GridHelper(120,60,0x2f6a8a,0x143040);grid.material.transparent=true;grid.material.opacity=0;grid.material.depthWrite=false;grid.position.y=0.02;scene.add(grid);

// ============================================================
//  時間軸
// ============================================================
const DUR=[8,16,16,8,9,3];
const B=[0];DUR.forEach(d=>B.push(B[B.length-1]+d));
const TOTAL=B[B.length-1];
let t=0,playing=false,started=false,lastTs=0;

// 每幕：相機 + 系統目標
const SCN=[
 {cam:{p:[0,4.5,17],look:[0,5,-1],drift:[0,0,-6]}},   // 1 粒子問句
 {cam:{p:[0,5,15],look:[0,3.5,0],drift:[0,0,-2]}},    // 2 四部門包圍
 {cam:{p:[0,5,7],look:[0,4,-2],drift:[0,1,-1]}},      // 3 面板牢籠
 {cam:{p:[0,6.5,20],look:[0,5,0],drift:[0,1,6]}},     // 4 塌縮死寂
 {cam:{p:[0,4.5,19],look:[0,4.5,0],drift:[0,0,-2.5]}},  // 5 色溫翻轉+AI
 {cam:{p:[0,4.5,14],look:[0,4.5,1],drift:[0,0,-2]}},    // 6 遞光球收尾
];
const SUBS={0:'s1',1:'s2',2:'s3',3:'s4',4:'s5',5:'s6'};

// 顏色弧線（冷→暖）
const cold=new THREE.Color(0x04070d), coldFog=new THREE.Color(0x06101c);
const warm=new THREE.Color(0x1a1208), warmFog=new THREE.Color(0x2a1a0c);
const coldKey=new THREE.Color(0x3a78ff), warmKey=new THREE.Color(0xffa850);

function sceneAt(tt){for(let i=0;i<DUR.length;i++){if(tt<B[i+1]-1e-6)return i;}return DUR.length-1;}

// ---------- 相機 ----------
let camMode='cine';
let camFrom={pos:new THREE.Vector3(),look:new THREE.Vector3()};
let camTo={pos:new THREE.Vector3(),look:new THREE.Vector3(),drift:new THREE.Vector3()};
let camTweenT=1,curLook=new THREE.Vector3(0,4,0),sceneIdx=-1;
function gotoScene(i){const s=SCN[i];if(camMode==='cine'){camFrom.pos.copy(camera.position);camFrom.look.copy(curLook);camTo.pos.set(s.cam.p[0],s.cam.p[1],s.cam.p[2]);camTo.look.set(s.cam.look[0],s.cam.look[1],s.cam.look[2]);camTo.drift.set(s.cam.drift[0],s.cam.drift[1],s.cam.drift[2]);camTweenT=0;}}
controls.addEventListener('start',()=>{camMode='free';});

// ============================================================
//  音樂（Web Audio，同 2D 弧線）
// ============================================================
const M={ctx:null,master:null,muted:false,vol:0.6,noiseGain:null,droneGain:null,sched:0,beat:0,buf:null};
function initAudio(){if(M.ctx)return;const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;const c=M.ctx=new AC();
  M.master=c.createGain();M.master.gain.value=M.vol;M.master.connect(c.destination);
  const dly=c.createDelay(1);dly.delayTime.value=0.33;const fb=c.createGain();fb.gain.value=0.3;const wet=c.createGain();wet.gain.value=0.28;M.master.connect(dly);dly.connect(fb);fb.connect(dly);dly.connect(wet);wet.connect(c.destination);
  const buf=c.createBuffer(1,c.sampleRate*2,c.sampleRate);const ch=buf.getChannelData(0);for(let i=0;i<ch.length;i++)ch[i]=Math.random()*2-1;M.buf=buf;
  const ns=c.createBufferSource();ns.buffer=buf;ns.loop=true;const lp=c.createBiquadFilter();lp.type='bandpass';lp.frequency.value=900;lp.Q.value=0.7;M.noiseGain=c.createGain();M.noiseGain.gain.value=0;ns.connect(lp);lp.connect(M.noiseGain);M.noiseGain.connect(M.master);ns.start();
  const o=c.createOscillator();o.type='sine';o.frequency.value=55;const o2=c.createOscillator();o2.type='sine';o2.frequency.value=55.4;M.droneGain=c.createGain();M.droneGain.gain.value=0.05;o.connect(M.droneGain);o2.connect(M.droneGain);M.droneGain.connect(M.master);o.start();o2.start();
  M.sched=c.currentTime+0.1;}
function thump(t0,v){const c=M.ctx;const o=c.createOscillator();o.type='sine';o.frequency.setValueAtTime(95,t0);o.frequency.exponentialRampToValueAtTime(38,t0+0.22);const g=c.createGain();g.gain.setValueAtTime(v,t0);g.gain.exponentialRampToValueAtTime(0.001,t0+0.36);o.connect(g);g.connect(M.master);o.start(t0);o.stop(t0+0.4);}
function click(t0,v){const c=M.ctx;const ns=c.createBufferSource();ns.buffer=M.buf;const bp=c.createBiquadFilter();bp.type='bandpass';bp.frequency.value=2600;bp.Q.value=2;const g=c.createGain();g.gain.setValueAtTime(v,t0);g.gain.exponentialRampToValueAtTime(0.001,t0+0.05);ns.connect(bp);bp.connect(g);g.connect(M.master);ns.start(t0);ns.stop(t0+0.06);}
function piano(t0,f,v,dur){const c=M.ctx;const g=c.createGain();g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(v,t0+0.012);g.gain.exponentialRampToValueAtTime(0.001,t0+(dur||2));const o=c.createOscillator();o.type='triangle';o.frequency.value=f;const o2=c.createOscillator();o2.type='sine';o2.frequency.value=f*2;const g2=c.createGain();g2.gain.value=0.3;o.connect(g);o2.connect(g2);g2.connect(g);g.connect(M.master);o.start(t0);o2.start(t0);o.stop(t0+(dur||2)+0.1);o2.stop(t0+(dur||2)+0.1);}
function chordMaj(t0,root,v){[0,4,7,12].forEach((s,i)=>piano(t0+i*0.05,root*Math.pow(2,s/12),v*0.6,3.2));}
const SCALE=[261.63,293.66,329.63,392.0,440.0];
function musicScene(i){if(!M.ctx)return;const c=M.ctx,now=c.currentTime;M.noiseGain.gain.cancelScheduledValues(now);
  if(i===2){M.noiseGain.gain.setValueAtTime(M.noiseGain.gain.value,now);M.noiseGain.gain.linearRampToValueAtTime(0.16,now+12);}
  else if(i===3){M.noiseGain.gain.setValueAtTime(M.noiseGain.gain.value,now);M.noiseGain.gain.linearRampToValueAtTime(0,now+0.25);}
  else{M.noiseGain.gain.linearRampToValueAtTime(0,now+0.5);}
  const dg=[0.05,0.06,0.07,0.045,0.03,0.02][i];M.droneGain.gain.linearRampToValueAtTime(dg,now+1);
  if(i===4)chordMaj(now+0.1,261.63,0.5);if(i===5)chordMaj(now+0.1,392.0,0.45);}
function musicTick(){if(!M.ctx)return;const c=M.ctx;if(c.state==='suspended'){c.resume();return;}const i=sceneAt(t),ls=t-B[i];
  while(M.sched<c.currentTime+0.2){const tt=M.sched;
    if(i===0){if(M.beat%8===0)thump(tt,0.5);if(M.beat%16===4)piano(tt,SCALE[2]*2,0.06,2.2);}
    else if(i===1){const dens=2+Math.floor(ls/4);if(M.beat%Math.max(2,8-dens)===0)thump(tt,0.42);}
    else if(i===2){if(M.beat%2===0)click(tt,0.12+ls*0.01);if(M.beat%6===0)thump(tt,0.3);}
    else if(i===3){if(M.beat%16===0)click(tt,0.05);}
    else if(i===4){if(M.beat%8===0)piano(tt,SCALE[(M.beat/8)%SCALE.length|0],0.12,2.4);}
    else if(i===5){if(M.beat%8===0)piano(tt,SCALE[2]*2,0.1,2.6);}
    M.sched+=60/120/2;M.beat++;}}

// ============================================================
//  旁白（Web Speech）
// ============================================================
const NARR=[
 '就這麼一句話。三秒鐘，應該就能回答吧？',
 '可是要回答它，得先問倉管，倉管要我問生管；生管要我看採購；採購要我等品管。一句話，散在四個地方。',
 '庫存表、預估表、交期表、採購單、驗收紀錄……五六張表貼來貼去，湊了一整個下午，數字永遠對不齊。',
 '天黑了，忙了一整天。可是我最不安的是——這個答案，到底對不對？沒人敢拍胸脯。',
 '那如果……有一個懂供應鏈的 AI 同事呢？你只要問它一句，它就接手。',
 '同樣的問題，再問一次。這次，三秒就有答案。隨問，隨答。'
];
const N={on:true,active:false,voice:null,pending:null,guard:null,cur:null,sup:('speechSynthesis' in window)};
function pickV(){if(!N.sup)return;const vs=speechSynthesis.getVoices();N.voice=vs.find(v=>/zh[-_]TW/i.test(v.lang))||vs.find(v=>/zh[-_]HK/i.test(v.lang))||vs.find(v=>/^zh/i.test(v.lang))||null;}
if(N.sup){pickV();speechSynthesis.onvoiceschanged=pickV;}
function duck(){if(M.master)M.master.gain.value=M.muted?0:(N.on&&N.active?M.vol*0.45:M.vol);}
function stopN(){if(!N.sup)return;clearTimeout(N.pending);clearTimeout(N.guard);N.cur=null;speechSynthesis.cancel();N.active=false;duck();}
function speak(i){if(!N.sup)return;stopN();if(!N.on)return;const txt=NARR[i];if(!txt)return;N.active=true;duck();
  N.pending=setTimeout(()=>{const u=new SpeechSynthesisUtterance(txt);if(N.voice)u.voice=N.voice;u.lang=N.voice?N.voice.lang:'zh-TW';u.rate=(i<=3?0.97:1.0);u.pitch=1;u.volume=1;N.cur=u;u.onend=u.onerror=()=>{if(N.cur===u){N.active=false;duck();}};speechSynthesis.speak(u);},650);
  N.guard=setTimeout(()=>{N.active=false;duck();},60000);}

// ============================================================
//  幕進入
// ============================================================
function onEnter(i){musicScene(i);speak(i);}

// ============================================================
//  渲染
// ============================================================
function sceneOpacity(i){const s=B[i],e=B[i+1],F=1.2,H=0.6;let inn=(i===0)?smooth(t/1.6):smooth((t-(s-H))/F);let out=(i===5)?1:(1-smooth((t-(e-H))/F));return clamp(inn*out,0,1);}
const _v=new THREE.Vector3();let perfNow=0;
const lerp=(a,b,k)=>a+(b-a)*Math.min(1,k);

function render(dt){
  const i=sceneAt(t);
  if(i!==sceneIdx){if(camMode==='cine')gotoScene(i);sceneIdx=i;onEnter(i);}
  const ls=t-B[i],lp=clamp(ls/DUR[i],0,1),T=perfNow*0.001;

  // ---- 色溫即光源（場景5 翻轉）----
  const warmth=smooth((t-(B[4]+1))/3.5); // 場景5 開始染暖
  scene.background.copy(cold).lerp(warm,warmth);
  scene.fog.color.copy(coldFog).lerp(warmFog,warmth);
  keyLight.color.copy(coldKey).lerp(warmKey,warmth);
  keyLight.intensity=lerp(keyLight.intensity,(i===3?0.5:1.3)+warmth*0.8,dt*2);
  hemi.intensity=lerp(hemi.intensity,(i===3?0.3:0.5)+warmth*0.3,dt*2);
  if(bloom)bloom.strength=lerp(bloom.strength,(i===3?0.45:0.72)+warmth*0.28,dt*2);

  // ---- 場景1：環境光點緩緩飄移（氛圍，不拼字）----
  {for(let k=0;k<TN;k++){tPos[k*3]=tStart[k*3]+Math.sin(T*0.3+k)*0.4;tPos[k*3+1]=tStart[k*3+1]+Math.cos(T*0.25+k*1.3)*0.3;tPos[k*3+2]=tStart[k*3+2];}
   tGeo.attributes.position.needsUpdate=true;
   let op=(i===0)?smooth(ls/2)* (1-smooth((ls-6.5)/1.2)) :0;
   tMat.opacity=op*0.5;tPts.visible=op>0.01;}

  // ---- 場景2：四部門 + 問題光點彈跳 + 纏線 ----
  {const on=(i===1)?1:0;
   DEPT.forEach((d,k)=>{let tg=0;if(i===1)tg=(ls>d.pop)?1:0;else tg=on;d.actor.vis=lerp(d.actor.vis,tg,dt*3);setVis(d.actor,easeOut(d.actor.vis));
     if(d.actor.group.visible)d.actor.group.position.y=0.4*Math.sin(T*1.5+k);});
   // 問題光點：在四部門之間彈跳（回不到原點）
   aQball.vis=lerp(aQball.vis,(i===1?1:0),dt*3);setVis(aQball,aQball.vis);
   if(aQball.group.visible){const seg=Math.floor((ls*0.8))%4;const nseg=(seg+1)%4;const fr=(ls*0.8)%1;
     const A=DEPT[seg].actor.group.position,Bp=DEPT[nseg].actor.group.position;
     qball.position.set(lerp(A.x,Bp.x,fr),4+Math.sin(fr*Math.PI)*3,lerp(A.z,Bp.z,fr));}
   // 纏線
   lineMat.opacity=lerp(lineMat.opacity,(i===1?0.5:0),dt*2);
   if(lineMat.opacity>0.01){let p=0;DEPT.forEach((d,k)=>{const P=d.actor.group.position;for(let s=0;s<16;s++){const f0=s/16,f1=(s+1)/16;
     const wob=Math.sin(T*2+k*2+f0*6)*1.2*f0;
     linePos[p++]=P.x*f0+wob;linePos[p++]=3+(P.y+ (1-f0)*1)*0+3*f0+Math.sin(T*3+k+s)*0.6;linePos[p++]=P.z*f0+wob;
     linePos[p++]=P.x*f1+Math.sin(T*2+k*2+f1*6)*1.2*f1;linePos[p++]=3+3*f1+Math.sin(T*3+k+s+1)*0.6;linePos[p++]=P.z*f1+Math.sin(T*2+k*2+f1*6)*1.2*f1;}});
     lineGeo.attributes.position.needsUpdate=true;}}

  // ---- 場景3：六張玻璃面板環繞牢籠 ----
  {PANELS.forEach((p,k)=>{const tg=(i===2)?1:0;p.vis=lerp(p.vis,tg,dt*2.2);setVis(p,p.vis);
     if(p.group.visible){const ang=T*0.25+k/PN*Math.PI*2;const rad=10-easeOut(clamp(ls/12,0,1))*3.5; // 越收越近
       const yy=3+Math.sin(T*0.6+k)*1.5+ (k%3)*1.2;
       p.group.position.set(Math.cos(ang)*rad,yy,Math.sin(ang)*rad);
       p.group.lookAt(0,yy,0);}});}

  // ---- 場景4：面板塌縮成光塵 + 21:47 ----
  {const tg=(i===3)?1:0;dMat.opacity=lerp(dMat.opacity,tg*0.85,dt*1.5);dust.visible=dMat.opacity>0.01;
   if(dust.visible){for(let k=0;k<DN;k++){dPos[k*3]+=dVel[k*3]*dt;dPos[k*3+1]+=dVel[k*3+1]*dt;dPos[k*3+2]+=dVel[k*3+2]*dt;if(dPos[k*3+1]<0){dPos[k*3+1]=14;}}dGeo.attributes.position.needsUpdate=true;}
   document.getElementById('clock3d').style.opacity=(i===3?smooth(ls/0.5):0).toFixed(3);}

  // ---- 場景5-6：暖金 AI 同事 + 光球 ----
  {aAlly.vis=lerp(aAlly.vis,(i>=4?1:0),dt*1.8);setVis(aAlly,easeOut(aAlly.vis));
   if(aAlly.group.visible)ally.position.y=0.4*Math.sin(T*1.4);
   aOrb.vis=lerp(aOrb.vis,(i===5?1:0),dt*2.2);setVis(aOrb,aOrb.vis);
   if(aOrb.group.visible)orb.position.set(1.4,4.3+0.18*Math.sin(T*2),3.6+easeOut(lp)*1.2);}

  // 地面網格
  grid.material.opacity=lerp(grid.material.opacity,[0.1,0.25,0.2,0.1,0.3,0.4][i],dt*1.5);

  // ---- 字幕 ----
  for(const k in SUBS)document.getElementById(SUBS[k]).style.opacity='0';
  if(SUBS[i]){const el=document.getElementById(SUBS[i]);let op;
    if(i===0)op=smooth((ls-2.8)/1.5);else if(i===5)op=smooth((ls-0.3)/1.0);else if(i===1)op=smooth((ls-8.5)/1.2);else if(i===2)op=smooth((ls-12.5)/1.2);else if(i===4)op=smooth((ls-0.6)/1.6);else op=smooth((ls-1.0)/1.6);
    el.style.opacity=op.toFixed(3);}

  // ---- 相機 ----
  if(camMode==='cine'){camTweenT=Math.min(1,camTweenT+dt/3.2);const e=easeIO(camTweenT);
    _v.copy(camTo.pos).addScaledVector(camTo.drift,lp);
    // 第一人稱手持晃動；場景4 下沉失焦感
    _v.x+=Math.sin(T*1.3)*0.25+Math.sin(T*0.7)*0.15;_v.y+=Math.sin(T*1.1)*0.18;
    if(i===3){_v.y-=easeOut(lp)*1.5;}
    camera.position.lerpVectors(camFrom.pos,_v,e);
    curLook.lerpVectors(camFrom.look,camTo.look,e);camera.lookAt(curLook);controls.target.copy(curLook);
  }else{controls.update();curLook.copy(controls.target);}

  document.getElementById('progi').style.width=(t/TOTAL*100)+'%';
  document.getElementById('prog').style.opacity=(started&&playing&&t<TOTAL)?'1':'0';
  document.getElementById('endhint').style.opacity=(started&&t>=TOTAL)?'1':'0';

  if(useComposer)composer.render();else renderer.render(scene,camera);
}

// ---------- 主迴圈 ----------
let _lw=0,_lh=0;
function checkResize(){if(innerWidth===_lw&&innerHeight===_lh)return;_lw=innerWidth;_lh=innerHeight;camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);if(useComposer)composer.setSize(innerWidth,innerHeight);}
function loop(now){perfNow=now;if(!lastTs)lastTs=now;let dt=(now-lastTs)/1000;lastTs=now;if(dt>0.1)dt=0.1;checkResize();if(started&&playing){t+=dt;if(t>=TOTAL){t=TOTAL;playing=false;}}render(dt);if(started)musicTick();requestAnimationFrame(loop);}

// ---------- 控制 ----------
function resetActors(){ACT.forEach(a=>{a.vis=0;setVis(a,0);});tMat.opacity=0;lineMat.opacity=0;dMat.opacity=0;DEPT.forEach(d=>d.actor.vis=0);}
function begin(){started=true;playing=true;t=0;lastTs=0;sceneIdx=-1;resetActors();document.getElementById('start').classList.add('hide');document.body.classList.add('cine');camMode='cine';initAudio();gotoScene(0);try{const el=document.documentElement;if(el.requestFullscreen)el.requestFullscreen().catch(()=>{});}catch(e){}}
function nextScene(){if(!started)return;for(let i=1;i<B.length;i++){if(B[i]>t+0.05){t=B[i];if(t>=TOTAL){t=TOTAL;playing=false;}return;}}t=TOTAL;playing=false;}
function replay(){if(!started){begin();return;}t=0;playing=true;lastTs=0;sceneIdx=-1;resetActors();stopN();camMode='cine';gotoScene(0);}
function toggle(){if(!started||t>=TOTAL)return;playing=!playing;if(!playing)stopN();}
document.getElementById('playBtn').addEventListener('click',e=>{e.stopPropagation();begin();});
canvas.addEventListener('click',()=>{if(started)nextScene();});
addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();started?toggle():begin();}
  else if(e.code==='ArrowRight'){e.preventDefault();nextScene();}
  else if(e.key==='r'||e.key==='R'){e.preventDefault();replay();}
  else if(e.key==='m'||e.key==='M'){if(!M.ctx)initAudio();M.muted=!M.muted;duck();}
  else if(e.key==='n'||e.key==='N'){N.on=!N.on;if(!N.on)stopN();else if(started)speak(sceneAt(t));}
});

// 除錯
window.__seek=x=>{started=true;playing=false;document.getElementById('start').classList.add('hide');document.body.classList.add('cine');camMode='cine';t=clamp(x,0,TOTAL);sceneIdx=-1;gotoScene(sceneAt(t));camTweenT=1;camera.position.set(SCN[sceneAt(t)].cam.p[0],SCN[sceneAt(t)].cam.p[1],SCN[sceneAt(t)].cam.p[2]);for(let k=0;k<50;k++)render(0.05);};
window.__t=()=>t;window.__hidden=()=>document.hidden;window.__bloom=()=>useComposer;

checkResize();requestAnimationFrame(loop);

}catch(err){fatal('初始化錯誤：'+err.message+'<br><pre style="font-size:11px;white-space:pre-wrap">'+(err.stack||'')+'</pre>');console.error(err);}
}
</script>
